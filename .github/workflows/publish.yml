name: Publish to npm

on:
  release:
    types: [published]

# Minimal permissions + id-token for npm provenance (Sigstore)
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

      # Publish with provenance attestation (Sigstore)
      # Cryptographically links npm package to this repo + commit
      # Users can verify: npm audit signatures
      - run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
